<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="icon.svg" type="image/svg" />
    <title>Photo Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a1a;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        #loading_text {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: system-ui, sans-serif;
            font-size: 16px;
            background: #1a1a1a;
            z-index: 10;
        }
    </style>
</head>

<body>
    <canvas id="rust-insert-wasm"></canvas>
    <div id="loading_text">Loading…</div>
    <script type="module">
        import init from "./pkg/photo_editor.js";

        (async () => {
            if (!navigator.gpu) {
                document.getElementById("loading_text").innerHTML =
                    "<p><strong>WebGPU not available.</strong> Try Chrome 113+, Safari 26+, or Firefox 145+.</p>";
                return;
            }
            try {
                await init();
            } catch (error) {
                console.error(error);
                document.getElementById("loading_text").innerHTML =
                    `<p><strong>Failed to load.</strong> ${error}</p>`;
            }
        })();
    </script>
</body>

</html>
